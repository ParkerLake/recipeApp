<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen — Salty Lake Recipes</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A1A18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Recipes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* ── Kitchen mode — dark scrollable ─────────────────── */
    html, body { background: #1A1A18; color: #F5F4F0; }

    .k-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: #111110;
      border-bottom: 1px solid #2E2E2B;
    }
    .k-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #9C9A94;
      text-decoration: none;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .k-back:hover { background: #2A2A27; color: #F5F4F0; }
    .k-back svg { width: 16px; height: 16px; }

    .k-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 14px;
      color: #E8E6DF;
    }

    .k-wake-btn {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #3A3A36;
      color: #9C9A94;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .k-wake-btn.active  { color: #F5B030; border-color: #7A5A10; background: #2A2010; }
    .k-wake-btn:hover   { border-color: #5A5A55; color: #E8E6DF; }

    /* ── Recipe body ─────────────────────────────────────── */
    .k-main { padding: 0 0 60px; }

    .k-recipe {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 22px 40px;
    }

    .k-hero-img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 14px;
      display: block;
      margin-bottom: 24px;
    }

    .k-recipe-title {
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: #F5F4F0;
      margin-bottom: 10px;
    }

    .k-meta {
      font-size: 15px;
      color: #6C6A64;
      margin-bottom: 14px;
    }

    .k-desc {
      font-size: 17px;
      color: #9C9A94;
      line-height: 1.6;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid #2E2E2B;
    }

    .k-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: #5C5A55;
      margin-bottom: 16px;
    }

    .k-divider {
      height: 1px;
      background: #2E2E2B;
      margin: 32px 0;
    }

    /* ── Ingredients ─────────────────────────────────────── */
    .k-ingredients { list-style: none; }
    .k-ingredients li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid #262623;
      font-size: clamp(16px, 3vw, 20px);
      color: #E8E6DF;
      line-height: 1.4;
    }
    .k-ingredients li:last-child { border-bottom: none; }

    .k-check {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 1.5px solid #4A4A46;
      background: transparent;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      appearance: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .k-check:checked { background: var(--accent); border-color: var(--accent); }
    .k-check:checked + label { opacity: 0.38; text-decoration: line-through; }
    .k-ingredients label { cursor: pointer; flex: 1; }

    /* ── Instructions ────────────────────────────────────── */
    .k-instructions { list-style: none; }
    .k-instructions li {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 16px;
      padding-bottom: 28px;
      align-items: start;
    }
    .k-step-num {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2A2A27;
      color: var(--accent);
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .k-step-body {
      font-size: clamp(17px, 3.5vw, 22px);
      line-height: 1.6;
      color: #E8E6DF;
      padding-top: 8px;
    }

    /* ── Notes ───────────────────────────────────────────── */
    .k-notes {
      font-size: clamp(15px, 2.5vw, 18px);
      color: #9C9A94;
      line-height: 1.65;
    }

    /* ── Loading / error ─────────────────────────────────── */
    .k-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
      color: #5C5A55;
      text-align: center;
      padding: 40px;
    }
    .k-spinner {
      width: 32px;
      height: 32px;
      border: 2.5px solid #2E2E2B;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── Sticky header ──────────────────────────────────── -->
  <div class="k-header">
    <a href="#" class="k-back" id="backBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 3L5 8l5 5"/></svg>
      Recipe
    </a>
    <div class="k-title" id="kTitle">…</div>
    <button class="k-wake-btn" id="wakeLockBtn" title="Keep screen awake">☀ Screen on</button>
  </div>

  <!-- ── Scrollable recipe ───────────────────────────────── -->
  <div class="k-main" id="kMain">
    <div class="k-center"><div class="k-spinner"></div><p>Loading…</p></div>
  </div>

  <script src="assets/kitchen.js"></script>
</body>
</html>
