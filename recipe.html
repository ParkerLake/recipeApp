<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recipe — Salty Lake Recipes</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C0663A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Recipes">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    /* ── Recipe detail overrides ──────────────────────── */
    body { background: var(--bg); }

    .detail-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-2);
      font-size: 14px;
      text-decoration: none;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: background 0.1s;
    }
    .back-btn:hover { background: var(--bg); color: var(--text); }
    .back-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .detail-header-title {
      font-size: 15px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edit-btn, .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text-2);
      font-size: 13px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      cursor: pointer;
      font-family: var(--font);
    }
    .edit-btn:hover, .copy-btn:hover { background: var(--bg); }
    .edit-btn svg, .copy-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
    .copy-btn.copied {
      color: var(--success);
      border-color: #a8d9be;
      background: var(--success-bg);
    }
    .made-it-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 13px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-strong);
      background: #fff;
      color: var(--text-2);
      font-size: 13px;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .made-it-btn:hover { background: var(--accent-light); color: var(--accent-dark); border-color: var(--accent); }
    .made-it-btn.logged { color: var(--success); border-color: #a8d9be; background: var(--success-bg); }

    /* ── Inline status selector ──────────────────────────── */
    .status-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .status-opt {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1.5px solid var(--border-strong);
      background: #fff;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: var(--font);
    }
    .status-opt:hover { border-color: var(--border-strong); background: var(--bg); }
    .status-opt.active-want   { background: #F0F4FF; color: #3A55C0; border-color: #A0B0F0; }
    .status-opt.active-made   { background: #FFF4E8; color: #8A5200; border-color: #E0B060; }
    .status-opt.active-normal { background: #EDFAF3; color: #1A6B43; border-color: #80CCA0; }

    /* ── Cooked log ──────────────────────────────────────── */
    .cooked-log {
      margin-top: 28px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .cooked-log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border);
    }
    .cooked-log-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
    }
    .cooked-log-count { font-size: 13px; color: var(--text-3); }
    .cooked-log-add {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
    }
    .cooked-log-add input[type="date"] {
      flex: 1;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
    }
    .cooked-log-add input[type="date"]:focus { border-color: var(--accent); outline: none; }
    .cooked-log-add-btn {
      padding: 7px 14px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      transition: background 0.15s;
      white-space: nowrap;
    }
    .cooked-log-add-btn:hover { background: var(--accent-dark); }
    .cooked-log-list { max-height: 240px; overflow-y: auto; }
    .cooked-log-entry {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 18px;
      font-size: 14px;
      color: var(--text-2);
      border-bottom: 1px solid var(--border);
    }
    .cooked-log-entry:last-child { border-bottom: none; }
    .cooked-log-del {
      font-size: 16px;
      color: var(--text-3);
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
      line-height: 1;
    }
    .cooked-log-del:hover { color: var(--danger); background: var(--danger-bg); }
    .cooked-log-empty {
      padding: 18px;
      font-size: 14px;
      color: var(--text-3);
      text-align: center;
    }

    .recipe-detail {
      max-width: 760px;
      margin: 0 auto;
      padding: 30px 20px 60px;
    }

    .recipe-hero { margin-bottom: 22px; }
    .recipe-hero-img {
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: var(--radius-lg);
      display: block;
      margin-bottom: 22px;
    }

    .recipe-title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .recipe-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--text-2);
    }
    .recipe-meta-item { display: flex; align-items: center; gap: 5px; }
    .recipe-meta-item svg { width: 15px; height: 15px; color: var(--text-3); }

    .recipe-stars { display: flex; gap: 3px; margin-bottom: 14px; }
    .detail-star { font-size: 20px; color: var(--border); }
    .detail-star.filled { color: var(--star); }

    .recipe-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }

    .recipe-source {
      font-size: 13px;
      color: var(--text-3);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .recipe-source a { color: var(--accent); text-decoration: none; }
    .recipe-source a:hover { text-decoration: underline; }
    .recipe-source svg { width: 13px; height: 13px; flex-shrink: 0; }

    .recipe-description {
      font-size: 16px;
      color: var(--text-2);
      line-height: 1.65;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .recipe-cols {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 32px;
      align-items: start;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .ingredients-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
    }

    .ingredients-list {
      list-style: none;
    }
    .ingredients-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.45;
      color: var(--text);
    }
    .ingredients-list li:last-child { border-bottom: none; }
    .ingredient-check {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 1.5px solid var(--border-strong);
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      appearance: none;
      transition: background 0.12s, border-color 0.12s;
    }
    .ingredient-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .ingredient-check:checked + span { opacity: 0.45; text-decoration: line-through; }

    .instructions-list {
      list-style: none;
      counter-reset: steps;
    }
    .instructions-list li {
      counter-increment: steps;
      display: grid;
      grid-template-columns: 32px 1fr;
      gap: 14px;
      padding: 0 0 22px;
      align-items: start;
    }
    .instructions-list li::before {
      content: counter(steps);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .instructions-list li p {
      font-size: 15px;
      line-height: 1.65;
      color: var(--text);
      padding-top: 5px;
    }

    .notes-box {
      margin-top: 32px;
      background: #FFFBF5;
      border: 1px solid #F0E0C0;
      border-radius: var(--radius-lg);
      padding: 18px 20px;
    }
    .notes-box .section-title { color: #B07020; }
    .notes-box p { font-size: 14px; line-height: 1.65; color: var(--text-2); }

    @media (max-width: 640px) {
      .recipe-cols { grid-template-columns: 1fr; }
      .recipe-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- ── Back bar ────────────────────────────────────── -->
  <div class="detail-header">
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 3L5 8l5 5"/>
      </svg>
      All recipes
    </a>
    <div class="detail-header-title" id="headerTitle">…</div>
    <button class="copy-btn" id="copyBtn" aria-label="Copy link to this recipe">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 4H4a1 1 0 00-1 1v8a1 1 0 001 1h8a1 1 0 001-1v-2"/>
        <rect x="6" y="2" width="8" height="8" rx="1"/>
      </svg>
      <span id="copyBtnText">Copy link</span>
    </button>
    <button class="edit-btn" id="kitchenBtn" aria-label="Open in kitchen mode">
      🍳 Kitchen mode
    </button>
    <button class="edit-btn" id="editBtn">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M11 2l3 3-8 8H3v-3l8-8z"/>
      </svg>
      Edit
    </button>
  </div>

  <!-- ── Recipe detail ───────────────────────────────── -->
  <div class="recipe-detail" id="recipeDetail">
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Loading recipe…</p>
    </div>
  </div>

  <script src="assets/recipe.js"></script>
</body>
</html>
